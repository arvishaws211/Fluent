<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Offline — Fluent</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#6366f1" />
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #0b0b1a, #1f1f3a);
        color: #e5e7eb;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }
      main {
        max-width: 30rem;
        padding: 2rem;
        text-align: center;
      }
      h1 {
        background: linear-gradient(90deg, #6366f1, #a855f7);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        font-size: 2rem;
        margin-bottom: 0.5rem;
      }
      p { color: #9ca3af; line-height: 1.5; }
      button {
        margin-top: 1.5rem;
        padding: 0.75rem 1.5rem;
        background: #6366f1;
        color: white;
        border: 0;
        border-radius: 0.5rem;
        font-size: 1rem;
        cursor: pointer;
      }
      button:focus-visible { outline: 3px solid #a855f7; outline-offset: 2px; }
    </style>
  </head>
  <body>
    <main>
      <h1>You're offline</h1>
      <p>
        Fluent will reconnect automatically. Cached pages — your check-in pass,
        sensory map, and runbook — remain available from the home screen.
      </p>
      <button type="button" onclick="location.reload()">Retry</button>
    </main>
  </body>
</html>
